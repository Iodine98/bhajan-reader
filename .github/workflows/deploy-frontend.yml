name: Deploy Frontend to Hetzner

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Generate backend config
        env:
          BACKEND_URL: ${{ secrets.TAILSCALE_BACKEND_URL }}
        run: |
          printf "Object.defineProperty(window, 'BACKEND_URL', {\n  value: '%s',\n  writable: false,\n  configurable: false,\n});\n" \
            "$BACKEND_URL" > frontend/config.js

      - name: Deploy to Hetzner via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/
          server-dir: /public_html/bhajan_reader/
          protocol: ftps
          dangerous-clean-slate: true

  publish:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend/
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/bhajan-reader-backend:latest
