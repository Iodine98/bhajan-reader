name: Deploy Frontend to Hetzner

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'deploy/hetzner/**'
      - '.github/workflows/deploy-frontend.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Add PHP relay
        # No frontend/config.js is generated anymore -- window.BACKEND_URL
        # stays unset, so translator.js/speech.js/app.js's
        # `window.BACKEND_URL || ''` fallback already sends every API call
        # to this app's own origin (relative paths). .htaccess below routes
        # those same-origin requests to the relay, which holds the real
        # gateway URL + shared X-Api-Key secret server-side instead (see
        # deploy/hetzner/api-proxy.php's doc comment, and backend-gateway
        # issue #11 / Iodine98/backend-gateway#27's enforcement of that key).
        run: |
          cp deploy/hetzner/api-proxy.php frontend/api-proxy.php
          cp deploy/hetzner/htaccess frontend/.htaccess

      - name: Generate .env for the relay
        run: |
          cat > frontend/.env <<EOF
          GATEWAY_URL=${{ secrets.TAILSCALE_BACKEND_URL }}
          GATEWAY_ORIGIN=${{ secrets.GATEWAY_ORIGIN }}
          GATEWAY_API_KEY=${{ secrets.GATEWAY_API_KEY }}
          EOF

      - name: Deploy to Hetzner via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/
          server-dir: /public_html/bhajan_reader/
          protocol: ftps
          dangerous-clean-slate: true
