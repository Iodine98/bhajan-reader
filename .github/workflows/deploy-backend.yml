name: Deploy Backend to GHCR

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend/
          push: true
          tags: ghcr.io/${{ github.repository_owner | lower }}/bhajan-reader-backend:latest
